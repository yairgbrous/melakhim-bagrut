<script>
/* =========================================================================
   localStorage write hook (feature-gated downstream).
   Wraps localStorage.setItem so progress-prefixed keys broadcast a
   'mb-local-write' CustomEvent with {key, value}. The live app reads
   exactly as before — the original setItem is always called first.
   Prefixes captured: "jarvis." (exam/quiz/flashcard) and "melakhim_pro_"
   (legacy profile blob). Everything else is pass-through.
   AuthProvider listens to these events; when signed-in + feature flag on,
   it debounces 2s then pushes a diff to RTDB users/{uid}/progress.
(function(){
  if (typeof window === "undefined" || !window.localStorage) return;
  const PREFIXES = ["jarvis.", "melakhim_pro_"];
  const orig = window.localStorage.setItem.bind(window.localStorage);
  try {
    window.localStorage.setItem = function(key, value){
      orig(key, value);
      try {
        if (typeof key === "string" && PREFIXES.some(p => key.indexOf(p) === 0)) {
          window.dispatchEvent(new CustomEvent("mb-local-write", { detail: { key, value } }));
        }
      } catch {}
    };
    window.__MB_LOCAL_HOOK__ = true;
  } catch (e) { /* iframes / strict mode sandboxes may reject — fall through */ }

  // Feature flag for RTDB auth + progress sync. OFF by default. Flip in
  // devtools with `window.MELAKHIM_AUTH_ENABLED = true; window.MelakhimAuth.init()`
  // once the Firebase config is pasted into localStorage["melakhim_firebase_config"]
  // AND database rules have been deployed (see database.rules.json).
  if (typeof window !== "undefined" && window.MELAKHIM_AUTH_ENABLED === undefined) {
    window.MELAKHIM_AUTH_ENABLED = false;
  }
})();
</script>
<!-- Critical data: load synchronously BEFORE the entity-index bootstrap so
     window.CHARACTERS_DATA and window.KINGS_DATA are populated up front.
     Previous async import() path was failing silently in production. -->
<script src="./data/characters.js?v=14100"></script>
<script src="./data/kings.js?v=14100"></script>
<script>
/* =========================================================================
   Entity index bootstrap — loads data modules into window.__ENTITY_INDEX__
   Fails gracefully per-file. Dispatches 'entity-index-ready' when done.
   Non-module files (motifs.js, archaeology.js, hebrew-dates.js) are eval'd
   in a Function scope; module files via dynamic import.
   ========================================================================= */
(async function bootEntityIndex(){
  // GUARD — if the static <script src> tags above already populated the
  // critical globals, do nothing. Without this guard the IIFE will:
  //   (a) reset window.__ENTITY_INDEX__ to a fresh shell, racing the
  //       backfill in data/_entity-index.js (place/event/breadth/quote/
  //       recurringItem buckets get briefly wiped), and
  //   (b) overwrite window.UNIT_DEEP_SUMMARIES with [] because
  //       data/unit-deep-summaries.js is a classic script (no ES export)
  //       so import().default and import().unitDeepSummaries are both
  //       undefined, falling through to the empty-array fallback.
  // Symptom on live: /#/unit/N Learn tab shows the
  // "סיכום מעמיק ליחידה זו טרם הוזן" placeholder despite data being loaded.
  if (Array.isArray(window.UNIT_DEEP_SUMMARIES) && window.UNIT_DEEP_SUMMARIES.length > 0) {
    return;
  }
  window.__ENTITY_INDEX__ = {
    motif:{}, date:{}, archaeology:{}, character:{},
    story:{}, flashcard:{}, keyConcept:{}, verse:{}
  };
  async function evalFile(url, captureNames){
    try{
      const r = await fetch(url, { cache:'no-cache' });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const txt = await r.text();
      const captured = {};
      const capLines = (captureNames||[]).map(v => `try{captured.${v}=${v}}catch(e){}`).join(';');
      new Function('window','captured', txt + '\n;' + capLines)(window, captured);
      Object.keys(captured).forEach(k => { if(captured[k]!==undefined) window[k]=captured[k]; });
      return true;
    }catch(e){ console.warn('[entity-boot] failed', url, (e && e.message)||e); return false; }
  }
  async function importModule(url){
    try{ return await import(url); }
    catch(e){ console.warn('[entity-boot] module import failed', url, (e && e.message)||e); return null; }
  }
  await Promise.all([
    evalFile('./data/motifs.js', ['motifs']),
    evalFile('./data/archaeology.js', ['archaeologyFinds']),
    evalFile('./data/hebrew-dates.js', []),
    evalFile('./data/_id-aliases.js?v=14100', []),
    evalFile('./data/breadth.js?v=14100', []),
  ]);
  const [chars, stories, flashcards, keyConcepts, kingsMod, unitDeepMod] = await Promise.all([
    importModule('./data/characters.js?v=14100'),
    importModule('./data/stories.js'),
    importModule('./data/flashcards.js'),
    importModule('./data/key-concepts.js'),
    importModule('./data/kings.js?v=14100'),
    importModule('./data/unit-deep-summaries.js?v=14100')
  ]);
  if (unitDeepMod) {
    window.UNIT_DEEP_SUMMARIES = unitDeepMod.default || unitDeepMod.unitDeepSummaries || window.UNIT_DEEP_SUMMARIES || [];
  }
  const idx = window.__ENTITY_INDEX__;
  (window.motifs||[]).forEach(m => {
    idx.motif[m.id] = Object.assign({}, m, {
      summary: m.description_hebrew || m.description || m.theological_significance_hebrew || '',
      heading: m.label_nikud || m.label || m.id
    });
  });
  (window.archaeologyFinds||[]).forEach(a => {
    idx.archaeology[a.id] = Object.assign({}, a, {
      summary: a.description_hebrew_200_words || a.description_hebrew || '',
      heading: a.name_hebrew_nikud || a.name_hebrew || a.id
    });
  });
  (window.HEBREW_DATES||[]).forEach(d => {
    idx.date[d.id] = Object.assign({}, d, {
      summary: d.event_long || d.event_short || '',
      heading: d.display_label_hebrew || d.id
    });
  });
  // Prefer window.CHARACTERS_DATA (set by static <script src> above) over
  // the dynamic import() result which was failing silently in production.
  const chArr = (Array.isArray(window.CHARACTERS_DATA) && window.CHARACTERS_DATA.length)
    ? window.CHARACTERS_DATA
    : ((chars && (chars.default || chars.characters)) || []);
  chArr.forEach(c => {
    idx.character[c.id] = Object.assign({}, c, {
      summary: c.bio || c.description || '',
      heading: c.name || c.id
    });
  });
  const stArr = (stories && (stories.default || stories.stories)) || [];
  stArr.forEach(s => {
    idx.story[s.id] = Object.assign({}, s, {
      summary: s.summary || '',
      heading: s.title || s.id
    });
  });
  const flArr = (flashcards && (flashcards.default || flashcards.flashcards)) || [];
  flArr.forEach(f => {
    idx.flashcard[f.id] = Object.assign({}, f, {
      summary: f.back || '',
      heading: f.front || f.id
    });
  });
  const kcArr = (keyConcepts && (keyConcepts.default || keyConcepts.keyConcepts)) || [];
  kcArr.forEach(k => {
    idx.keyConcept[k.id] = Object.assign({}, k, {
      summary: k.expanded || k.shortDef || '',
      heading: k.title || k.id
    });
  });
  // Prefer window.KINGS_DATA (set by static <script src> above) over the
  // dynamic import() result. kings.js is now a non-module that assigns
  // the global directly; this branch keeps the import() fallback for
  // any previously-cached deployment that still serves the ES-module form.
  const kingsArr = (Array.isArray(window.KINGS_DATA) && window.KINGS_DATA.length)
    ? window.KINGS_DATA
    : ((kingsMod && (kingsMod.default || kingsMod.kings)) || []);
  idx.king = idx.king || {};
  kingsArr.forEach(kk => {
    idx.king[kk.id] = Object.assign({}, kk, {
      summary: kk.short_summary || '',
      heading: kk.name_niqqud || kk.id,
      name: kk.name_niqqud || kk.id
    });
  });
  // Raw array — consumed by KingsTable/KingsUtils/CharacterPage for real data.
  window.KINGS_DATA = kingsArr;
  window.__ENTITY_INDEX_READY__ = true;
  try{ window.dispatchEvent(new CustomEvent('entity-index-ready', {detail:idx})); }catch(e){}
  console.log('[entity-boot] ready', {
    motif: Object.keys(idx.motif).length,
    date: Object.keys(idx.date).length,
    archaeology: Object.keys(idx.archaeology).length,
    character: Object.keys(idx.character).length,
    story: Object.keys(idx.story).length,
    flashcard: Object.keys(idx.flashcard).length,
    keyConcept: Object.keys(idx.keyConcept).length,
    king: Object.keys(idx.king).length
  });
})();
</script>

html[data-theme='dark'] .parchment .text-on-parchment-accent,html[data-theme='dark'] .text-on-parchment-accent{color:#F4D58D!important}
html[data-theme='dark'] .parchment .text-on-parchment-muted,html[data-theme='dark'] .text-on-parchment-muted{color:rgba(245,230,200,.75)!important}
html[data-theme='dark'] .parchment .text-on-parchment-meta,html[data-theme='dark'] .text-on-parchment-meta{color:rgba(245,230,200,.6)!important}
html[data-theme='dark'] .gold-btn{background:linear-gradient(135deg,#F5D670 0%,#C89B3C 100%);color:#1A1611;border-color:#F4D58D}
html[data-theme='dark'] .gold-btn:hover:not(:disabled){box-shadow:0 6px 20px rgba(245,214,112,.45)}
html[data-theme='dark'] .rank-chip,html[data-theme='dark'] .me-chip{background:linear-gradient(135deg,#F5D670,#C89B3C);color:#1A1611;border-color:#F4D58D}
html[data-theme='dark'] header{background:rgba(10,22,40,.85)!important;border-color:rgba(212,165,116,.3)!important}
/* light mode override */
html[data-theme='light'] body{background:#F7F1E1;color:#1A1611}
html[data-theme='light'] body::before{background:radial-gradient(circle at 15% 20%,rgba(212,165,116,.18),transparent 50%),radial-gradient(circle at 85% 75%,rgba(107,91,149,.10),transparent 55%)}
html[data-theme='light'] header{background:rgba(247,241,225,.9)!important;border-color:rgba(139,111,71,.4)!important}
html[data-theme='light'] .card{background:linear-gradient(135deg,rgba(255,253,242,.95) 0%,rgba(238,226,196,.95) 100%);color:#1A1611;border-color:rgba(139,111,71,.35)}
html[data-theme='light'] .card .text-amber-100,html[data-theme='light'] .card .text-amber-200,html[data-theme='light'] .card .text-amber-300{color:#1A1611!important}
html[data-theme='light'] .text-amber-100\/60,html[data-theme='light'] .text-amber-100\/70{color:rgba(26,22,17,.7)!important}
html[data-theme='light'] input,html[data-theme='light'] textarea{background:#fff!important;color:#1A1611!important}
.theme-tog{padding:.35rem .55rem;border-radius:999px;background:rgba(212,165,116,.18);border:1px solid rgba(212,165,116,.45);color:#F4D58D;font-size:14px}
html[data-theme='light'] .theme-tog{color:#1A1611;background:rgba(139,111,71,.15)}
/* ---- ErrorBoundary fallback screen ---- */
.eb-screen{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.eb-card{max-width:560px;width:100%;padding:28px 22px;border-radius:18px;background:linear-gradient(135deg,rgba(168,50,64,.18),rgba(107,91,149,.14));border:1px solid #A83240;color:#F7F1E1;font-family:'Heebo','Frank Ruhl Libre',sans-serif;text-align:center;box-shadow:0 16px 40px -12px rgba(0,0,0,.55)}
html[data-theme='light'] .eb-card{color:#1A1611;background:linear-gradient(135deg,rgba(168,50,64,.10),rgba(212,165,116,.18));border-color:#A83240}
.eb-icon{font-size:54px;margin-bottom:6px;line-height:1}
.eb-title{font-family:'Frank Ruhl Libre',serif;font-size:26px;font-weight:900;margin:0 0 6px;color:#F4D58D}
html[data-theme='light'] .eb-title{color:#8B1F2A}
.eb-msg{font-size:14px;line-height:1.7;opacity:.92;margin:0 auto 14px;max-width:46ch}
.eb-trace{direction:ltr;text-align:left;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;line-height:1.5;background:rgba(0,0,0,.25);color:#F7F1E1;padding:10px 12px;border-radius:10px;max-height:160px;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:0 0 16px}
html[data-theme='light'] .eb-trace{background:rgba(26,22,17,.06);color:#3a2e20}
.eb-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.eb-btn{padding:10px 20px;border-radius:12px;font-weight:800;font-size:14px;border:1px solid transparent;cursor:pointer;transition:transform .1s ease,box-shadow .15s ease}
.eb-btn:active{transform:scale(.97)}
.eb-btn-primary{background:linear-gradient(135deg,#F5D670,#C89B3C);color:#1A1611;border-color:#F4D58D}
.eb-btn-primary:hover{box-shadow:0 6px 18px rgba(245,214,112,.35)}
.eb-btn-secondary{background:rgba(107,91,149,.22);color:#C9B8E0;border-color:rgba(107,91,149,.55)}
.eb-btn-secondary:hover{background:rgba(107,91,149,.35)}
html[data-theme='light'] .eb-btn-secondary{background:rgba(107,91,149,.14);color:#4A3D7A;border-color:rgba(107,91,149,.45)}
/* ---- Toast notifications (window.showToast) ---- */
.toast-host{position:fixed;inset-inline:0;bottom:calc(72px + env(safe-area-inset-bottom));z-index:120;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 12px}
.toast-item{pointer-events:auto;display:inline-flex;align-items:center;gap:10px;max-width:min(560px,92vw);padding:.7rem 1.1rem;border-radius:14px;font-weight:700;font-size:14px;line-height:1.35;color:#fff;box-shadow:0 12px 30px -10px rgba(0,0,0,.55);border:1px solid transparent;cursor:pointer;animation:toastInUp .3s cubic-bezier(.3,.8,.3,1)}
.toast-item .toast-ico{font-size:18px;line-height:1;flex-shrink:0}
.toast-item .toast-msg{font-family:'Heebo','Frank Ruhl Libre',sans-serif}
.toast-success{background:linear-gradient(135deg,#3E8E7E 0%,#2a6b5e 100%);border-color:#5FB39F;color:#F0FFF8}
.toast-error{background:linear-gradient(135deg,#A83240 0%,#7a1f2a 100%);border-color:#D94E5F;color:#FFF1F3}
.toast-info{background:linear-gradient(135deg,#3B6BB5 0%,#1E468C 100%);border-color:#6FA0E0;color:#E8F1FF}
@keyframes toastInUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@media (prefers-reduced-motion:reduce){.toast-item{animation:none}}
/* ---- Home redesign v1 + 20 polish ---- */
body{padding-bottom:calc(60px + env(safe-area-inset-bottom))}
.bottom-nav{position:fixed;bottom:0;inset-inline:0;z-index:50;display:grid;grid-template-columns:repeat(3,1fr);gap:0;height:56px;padding:0 0 env(safe-area-inset-bottom);background:rgba(247,241,225,.96);backdrop-filter:blur(14px);border-top:1px solid rgba(139,111,71,.35);box-shadow:0 -2px 10px rgba(0,0,0,.18)}
html[data-theme='dark'] .bottom-nav{background:rgba(10,22,40,.94);border-top-color:rgba(212,165,116,.35)}
.bn-item{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;color:rgba(26,22,17,.62);font-size:12px;font-weight:600;line-height:1;background:none;border:0;cursor:pointer;transition:color .15s ease}
html[data-theme='dark'] .bn-item{color:rgba(247,241,225,.6)}
.bn-item .bn-ico{font-size:24px;line-height:1;transition:transform .18s ease}
.bn-item.active{color:#8B6F1F;font-weight:800}
html[data-theme='dark'] .bn-item.active{color:#F4D58D}
.bn-item.active::after{content:"";position:absolute;left:18%;right:18%;bottom:6px;height:3px;border-radius:3px;background:linear-gradient(90deg,#F5D670,#C89B3C)}
.bn-item.active .bn-ico{transform:scale(1.06)}
/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:60;animation:fadeUp .2s ease-out}
.drawer{position:fixed;top:0;bottom:0;inset-inline-end:0;width:min(320px,85vw);background:linear-gradient(180deg,#0A1628 0%,#0F1F3A 100%);border-inline-start:1px solid rgba(212,165,116,.35);z-index:61;padding:18px 14px calc(18px + env(safe-area-inset-bottom));overflow-y:auto;animation:drawerIn .22s cubic-bezier(.3,.8,.3,1)}
html[data-theme='light'] .drawer{background:linear-gradient(180deg,#F7F1E1 0%,#EEE2C4 100%);color:#1A1611;border-inline-start-color:rgba(139,111,71,.35)}
@keyframes drawerIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-link{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:12px;background:transparent;border:1px solid transparent;color:inherit;font-size:14px;font-weight:700;text-align:start;cursor:pointer}
.drawer-link:hover,.drawer-link:focus-visible{background:rgba(212,165,116,.12);border-color:rgba(212,165,116,.35)}
.drawer-link.active{background:linear-gradient(135deg,#D4A574,#8B6F47);color:#1A1611}
.drawer-link .dico{font-size:20px;width:26px;text-align:center}
/* Horizontal 3-card scroll */
.hrow{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(230px,80%);gap:12px;overflow-x:auto;overflow-y:hidden;padding:4px 2px 10px;scroll-snap-type:x mandatory;scrollbar-width:thin}
@media (min-width:768px){.hrow{grid-auto-columns:minmax(260px,1fr)}}
.hrow>*{scroll-snap-align:start}
.hrow::-webkit-scrollbar{height:6px}
.hrow::-webkit-scrollbar-thumb{background:#8B6F47;border-radius:4px}
/* Rank chip + mini-stats chips */
.rank-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;background:linear-gradient(135deg,#F5D670,#C89B3C);color:#1A1611;font-weight:800;font-size:11px;border:1px solid #F4D58D;white-space:nowrap}
.mini-stats{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#F4D58D;font-weight:700}
.mini-stats .ms{display:inline-flex;align-items:center;gap:3px}
html[data-theme='light'] .mini-stats{color:#8B6F1F}
.me-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:linear-gradient(135deg,#F5D670,#C89B3C);color:#1A1611;font-weight:900;font-size:10px;margin-inline-start:6px;border:1px solid #F4D58D;letter-spacing:.02em}
/* Hamburger button */
.hmb{width:38px;height:38px;border-radius:12px;background:rgba(212,165,116,.15);border:1px solid rgba(212,165,116,.4);color:#F4D58D;display:inline-flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.hmb:hover{background:rgba(212,165,116,.3)}
html[data-theme='light'] .hmb{color:#8B6F1F;background:rgba(139,111,71,.15)}
/* Period filter chips */
.period-chip{padding:6px 14px;border-radius:999px;border:1px solid rgba(212,165,116,.4);background:rgba(212,165,116,.08);color:#F4D58D;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.period-chip.active{background:linear-gradient(135deg,#D4A574,#8B6F47);color:#1A1611;border-color:#F4D58D}
.period-chip:hover:not(.active){background:rgba(212,165,116,.18)}
/* Sync indicator */
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#5FB39F;margin-inline-end:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-ind{font-size:11px;color:rgba(244,213,141,.75);display:inline-flex;align-items:center}
/* 50/50 hint button */
.hint-btn{padding:6px 12px;border-radius:10px;background:rgba(107,91,149,.22);border:1px solid rgba(107,91,149,.55);color:#C9B8E0;font-size:12px;font-weight:700;cursor:pointer}
.hint-btn:hover:not(:disabled){background:rgba(107,91,149,.35)}
.hint-btn:disabled{opacity:.35;cursor:not-allowed}
@keyframes halfHide{from{opacity:1}to{opacity:.1}}
.half-hide{animation:halfHide .3s forwards;pointer-events:none}
/* Achievement locked */
.ach-locked{opacity:.35;filter:grayscale(.6);position:relative}
.ach-locked::after{content:'🔒';position:absolute;top:4px;inset-inline-end:6px;font-size:14px;opacity:.8}
/* Empty state */
.empty-state{text-align:center;padding:32px 16px}
.empty-state svg{width:96px;height:96px;margin:0 auto 12px;color:#F4D58D;filter:drop-shadow(0 4px 12px rgba(244,213,141,.3))}
/* Print */
@media print{
  .bottom-nav,.drawer,.drawer-overlay,.hmb,button,.next-btn{display:none!important}
  header{position:static!important;background:#fff!important;border:0!important}
  body,html{background:#fff!important;color:#000!important;padding:0!important}
  body::before{display:none!important}
  .card,.parchment{background:#fff!important;color:#000!important;border:1px solid #888!important;box-shadow:none!important;page-break-inside:avoid}
  .hebrew,.font-display{color:#000!important}
  .bottom-nav,footer{display:none!important}
}
/* ---- Mobile header: collapse stats to icon-only on narrow screens ---- */
@media (max-width:480px){
  .mini-stats{ gap:6px; font-size:13px; }
  .mini-stats .ms .num{ display:none; }
  .mini-stats .ms{ gap:0; padding:2px 4px; border-radius:8px; background:rgba(212,165,116,.10); }
  .rank-chip{ font-size:10px; padding:2px 6px; }
}
/* ---- ExamSim 2551 timer color states ---- */
.exam-timer-normal{color:#F4D58D}
.exam-timer-warn{color:#FBBF24;background:rgba(180,83,9,.18);padding:4px 10px;border-radius:8px}
.exam-timer-crit{color:#FCA5A5;background:rgba(127,29,29,.35);padding:4px 10px;border-radius:8px;animation:examTimerPulse 1s ease-in-out infinite}
@keyframes examTimerPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.05)}}

/* ---- Mobile ExamSim: fullscreen + sticky timer + sticky nav tabs ---- */
@media (max-width:640px){
  .exam-run-wrap{position:fixed;inset:0;z-index:45;padding:10px 10px calc(72px + env(safe-area-inset-bottom));margin:0;max-width:none;background:linear-gradient(180deg,#0A1628 0%,#0F1F3A 100%);overflow-y:auto;-webkit-overflow-scrolling:touch}
  html[data-theme='light'] .exam-run-wrap{background:linear-gradient(180deg,#F7F1E1 0%,#EEE2C4 100%)}
  .exam-run-wrap > *{max-width:680px;margin-inline:auto}
  .exam-run-timer{top:0!important;position:sticky}
  .exam-run-tabs{position:sticky;bottom:0;z-index:30;background:rgba(10,22,40,.95);backdrop-filter:blur(10px);margin:0 -10px;padding:8px;border-radius:0;border-top:1px solid rgba(212,165,116,.35)}
  html[data-theme='light'] .exam-run-tabs{background:rgba(247,241,225,.95)}
}

/* ---- PWA offline banner + install prompt ---- */
.pwa-offline-banner{position:fixed;top:0;inset-inline:0;z-index:55;padding:10px 14px;background:linear-gradient(135deg,#A83240,#6B1F2B);color:#FDEEEE;font-size:13px;font-weight:800;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.4);transform:translateY(-100%);transition:transform .25s ease}
.pwa-offline-banner.visible{transform:translateY(0)}
.pwa-install-card{position:fixed;inset-inline:16px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:44;max-width:480px;margin-inline:auto;padding:14px 16px;border-radius:16px;background:linear-gradient(135deg,#F7F1E1 0%,#EEE2C4 100%);color:#1A1611;border:2px solid #D4A574;box-shadow:0 12px 40px rgba(0,0,0,.55);display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease}
.pwa-install-card .pwa-icon{font-size:32px;flex-shrink:0}
.pwa-install-card .pwa-body{flex:1;min-width:0}
.pwa-install-card .pwa-title{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:15px;line-height:1.2}
.pwa-install-card .pwa-sub{font-size:12px;color:#4A3829;margin-top:2px;line-height:1.3}
.pwa-install-card .pwa-btns{display:flex;gap:6px;flex-shrink:0}
.pwa-install-card .pwa-btn{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:800;border:none;cursor:pointer;background:linear-gradient(135deg,#D4A574,#8B6F47);color:#1A1611}
.pwa-install-card .pwa-btn-ghost{background:transparent;border:1px solid rgba(139,111,31,.5);color:#8B6F1F}

/* ---- Share button on entity pages ---- */
.mb-share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;background:rgba(212,165,116,.15);border:1px solid rgba(212,165,116,.45);color:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s}
.mb-share-btn:hover{background:rgba(212,165,116,.3);transform:translateY(-1px)}

/* Service worker update toast already uses .toast */

/* ---- Entity chips + drawer (integrate-clickables) ---- */
.entity-chip{
  display:inline;
  cursor:pointer;
  color:#F5D670;
  font-weight:700;
  background:rgba(212,165,116,.08);
  border-bottom:1px dashed #C89B3C;
  padding:0 3px;
  border-radius:3px;
  transition:background .15s ease,color .15s ease;
  white-space:nowrap;
}
.entity-chip:hover,.entity-chip:focus{
  background:rgba(212,165,116,.28);
  color:#FFF1B8;
  outline:none;
}
html[data-theme='light'] .entity-chip{
  color:#8B6F1F;
  background:rgba(200,155,60,.12);
  border-bottom-color:#8B6F1F;
}
html[data-theme='light'] .entity-chip:hover{
  background:rgba(200,155,60,.28);
  color:#1A1611;
}
.entity-chip[data-type="verse"]{ color:#6BA89A; border-bottom-color:#3E8E7E; }
html[data-theme='light'] .entity-chip[data-type="verse"]{ color:#1F5C4A; border-bottom-color:#3E8E7E; }
.entity-chip[data-type="character"]{ color:#C9B8E0; border-bottom-color:#8B7FB0; }
html[data-theme='light'] .entity-chip[data-type="character"]{ color:#4A3D7A; border-bottom-color:#6B5B95; }
.entity-chip[data-type="place"]{ color:#E8B87A; border-bottom-color:#B07A3D; }
.entity-chip[data-missing="true"]{ color:inherit; border-bottom-style:dotted; opacity:.9; cursor:help; }

/* Drawer overlay + panel for entity details */
.ent-drawer-ovl{
  position:fixed; inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  z-index:70;
  animation:fadeUp .2s ease-out;
}
.ent-drawer{
  position:fixed; top:0; bottom:0; inset-inline-end:0;
  width:min(440px,92vw);
  background:linear-gradient(180deg,#0F1F3A 0%,#0A1628 100%);
  border-inline-start:1px solid rgba(212,165,116,.45);
  z-index:71;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));
  overflow-y:auto;
  animation:drawerIn .25s cubic-bezier(.3,.8,.3,1);
  color:#F5E6C8;
  box-shadow:-12px 0 40px rgba(0,0,0,.5);
}
html[data-theme='light'] .ent-drawer{
  background:linear-gradient(180deg,#FBF6EB 0%,#F0E4C4 100%);
  color:#1A1611;
  border-inline-start-color:#8B6F1F;
}
.ent-drawer-hdr{
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:12px; padding-bottom:10px;
  border-bottom:1px solid rgba(212,165,116,.3);
  margin-bottom:14px;
}
.ent-drawer-title{
  font-family:'Frank Ruhl Libre','Noto Serif Hebrew',serif;
  font-size:22px; font-weight:900;
  color:#F5D670; margin:0;
  line-height:1.25;
}
html[data-theme='light'] .ent-drawer-title{ color:#8B6F1F; }
.ent-drawer-type{
  display:inline-block; padding:2px 10px; border-radius:999px;
  background:rgba(212,165,116,.2); color:#F5D670;
  font-size:11px; font-weight:800; letter-spacing:.04em;
  margin-bottom:6px;
}
html[data-theme='light'] .ent-drawer-type{ background:rgba(139,111,31,.18); color:#5A4517; }
.ent-drawer-close{
  width:36px; height:36px; border-radius:10px;
  background:rgba(212,165,116,.15);
  border:1px solid rgba(212,165,116,.4);
  color:inherit; font-size:20px; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.ent-drawer-close:hover{ background:rgba(212,165,116,.3); }
.ent-drawer-body{
  font-family:'Frank Ruhl Libre','Noto Serif Hebrew',serif;
  font-size:15px; line-height:1.85;
  color:inherit;
}
.ent-drawer-body .sect{
  margin-top:12px; padding-top:10px;
  border-top:1px dashed rgba(212,165,116,.3);
}
.ent-drawer-body .sect-h{
  font-weight:800; font-size:13px; color:#F5D670;
  margin-bottom:4px; letter-spacing:.02em;
}
html[data-theme='light'] .ent-drawer-body .sect-h{ color:#8B6F1F; }
.ent-drawer-body a{
  color:#F5D670; text-decoration:underline;
  text-decoration-color:rgba(245,214,112,.4);
}
html[data-theme='light'] .ent-drawer-body a{ color:#8B6F1F; }
.ent-drawer-body ul{ padding-inline-start:1.2em; margin:6px 0; }
.ent-drawer-body li{ margin-bottom:4px; }

/* Verse drawer: external link grid */
.verse-links{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:8px; margin-top:12px;
}
.verse-links a{
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:10px 6px; border-radius:12px;
  background:linear-gradient(135deg,#D4A574 0%,#8B6F47 100%);
  color:#1A1611 !important;
  font-weight:800; font-size:12px; text-decoration:none !important;
  text-align:center;
  box-shadow:0 2px 8px rgba(200,155,60,.3);
}
.verse-links a span.big{ font-size:18px; }

/* StudyHub */
.study-tabs{
  display:flex; gap:6px; overflow-x:auto;
  padding:4px 2px 8px;
  scrollbar-width:thin;
}
.study-tabs::-webkit-scrollbar{ height:4px; }
.study-tab{
  padding:8px 14px; border-radius:999px;

// Token format: {{type:id|label}}  — renders as clickable entity chip.
const ENTITY_TYPE_LABELS = {
  motif:"מוטיב", date:"תאריך", archaeology:"ארכיאולוגיה",
  character:"דמות", story:"סיפור", flashcard:"כרטיסיה",
  keyConcept:"מושג", verse:"פסוק", king:"מלך", prophet:"נביא",
  place:"מקום", event:"אירוע", unit:"יחידה"
};
// Types we know how to resolve via __ENTITY_INDEX__ (others are shown as plain chips)
const ENTITY_TYPE_ALIAS = { king:"character", prophet:"character", place:"archaeology", event:"story", unit:"story" };
const TOKEN_RE = /\{\{(\w+):([\w-]+)\|([^}]+)\}\}/g;

// Open a drawer programmatically — dispatches CustomEvent the App picks up.
window.openEntityDrawer = function(type, id, label){
  try{
    window.dispatchEvent(new CustomEvent('mb-open-entity', {detail:{type,id,label:label||""}}));
  }catch(e){ console.warn('[openEntityDrawer] dispatch failed', e); }
};

// Inline token parser: returns an array of React nodes (strings + EntityChip elements).
function parseTokens(text){
  if(!text || typeof text !== 'string') return text;
  if(text.indexOf('{{') < 0) return text;
  const nodes = [];
  let last = 0; let m;
  TOKEN_RE.lastIndex = 0;
  while((m = TOKEN_RE.exec(text)) !== null){
    if(m.index > last) nodes.push(text.slice(last, m.index));
    const [, type, id, label] = m;
    nodes.push(React.createElement(EntityChip, {key:nodes.length, type, id, label}));
    last = m.index + m[0].length;
  }
  if(last < text.length) nodes.push(text.slice(last));
  return nodes;
}

function EntityChip({type, id, label}){
  const [open, setOpen] = useState(false);
  const idx = (typeof window!=='undefined' && window.__ENTITY_INDEX__) || {};
  const resolvedType = ENTITY_TYPE_ALIAS[type] || type;
  const bucket = idx[resolvedType];
  const missing = !bucket || !bucket[id];
  const title = ENTITY_TYPE_LABELS[type] ? ENTITY_TYPE_LABELS[type]+' · '+label : label;
  const toggle = () => setOpen(o=>!o);
  // Panel rendered ONLY when open → avoids breaking inline prose flow when chip is mid-sentence.
  return (
    <>
      <span className={`entity-chip ${open?'open':''}`}
        data-type={type} data-id={id}
        data-missing={missing?"true":undefined}
        role="button" tabIndex={0}
        onClick={toggle}
        onKeyDown={e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); } }}
        title={title}>
        {label}{open?' ▴':''}
      </span>
      {open && (
        <span className="expanded-panel open" style={{display:'block'}}>
          <span className="expanded-panel-inner" style={{display:'block'}}>
            <EntityDetail type={type} id={id} label={label}/>
          </span>
        </span>
      )}
    </>
  );
}

// Renders tokenized text as React children (safe — no innerHTML).
function EntityText({text, as="span", className}){
  const Tag = as;
  return <Tag className={className}>{parseTokens(text)}</Tag>;
}

// Bridge parseTokens + EntityChip so other Babel scripts (CharacterPage) can
// render tokenized text. Idempotent — set once per mount.
if (typeof window !== 'undefined') {
  window.parseTokens = parseTokens;
  window.EntityChipComponent = EntityChip;
}

// Full-page view for a place/event/motif/archaeology/story/etc. Reuses the
// same EntityDetail used by the drawer, wrapped with a back button.
function EntityFullPage({type, id, setRoute}){
  const idx = (typeof window!=='undefined' && window.__ENTITY_INDEX__) || {};
  const resolvedType = ENTITY_TYPE_ALIAS[type] || type;
  const data = (idx[resolvedType] || {})[id];
  const heading = data && (data.heading || data.name_hebrew_nikud || data.name || data.title || id);
  const typeLabel = ENTITY_TYPE_LABELS[type] || type;
  const icon = type === 'place' ? '📍' : type === 'event' ? '📜' : '🔎';
  return (
    <div className="max-w-3xl mx-auto space-y-4">
      <button onClick={()=>setRoute({page:'timeline'})} className="text-amber-300 text-sm">→ חזרה לציר המלכים</button>
      <div className="parchment rounded-2xl p-5 md:p-6">
        <div className="text-xs text-amber-800 font-bold">{typeLabel}</div>
        <h1 className="font-display text-2xl md:text-3xl font-black text-amber-900 hebrew">
          {icon} {heading || id}
        </h1>
      </div>
      <div className="kt-expanded rounded-2xl" style={{border:'1px solid rgba(212,165,116,.25)',padding:14}}>
        <EntityDetail type={type} id={id} label={heading||id}/>
      </div>
    </div>
  );
}

function VersePanel({id, label}){
  const m = /^([12])K-(\d+)-(\d+)(?:-(\d+))?$/.exec(id||"");
  const bookIdx = m ? m[1] : '1';
  const chapter = m ? parseInt(m[2],10) : null;
  const verseStart = m ? parseInt(m[3],10) : null;
  const verseEnd = m && m[4] ? parseInt(m[4],10) : verseStart;
  const book = bookIdx==='2' ? 'מלכים ב' : 'מלכים א';
  const sefariaSlug = bookIdx==='2' ? 'II_Kings' : 'I_Kings';
  const mamreCode = bookIdx==='2' ? 'k9b' : 'k9a';
  const ch2 = chapter ? String(chapter).padStart(2,'0') : '01';
  const sefariaUrl = chapter && verseStart
    ? `https://www.sefaria.org.il/${sefariaSlug}.${chapter}.${verseStart}?lang=he`
    : `https://www.sefaria.org.il/${sefariaSlug}?lang=he`;
  const mamreUrl = `https://mechon-mamre.org/i/t/t${mamreCode}${ch2}.htm`;
  const refText = chapter && verseStart
    ? (verseEnd && verseEnd!==verseStart ? `${book} ${chapter}:${verseStart}-${verseEnd}` : `${book} ${chapter}:${verseStart}`)
    : (label || id);
  return (
    <>
      <div className="sect">
        <div className="sect-h">📖 {refText}</div>
        <div>{label || refText}</div>
      </div>
      <div className="sect">
        <div className="sect-h">קרא במקורות</div>
        <div className="verse-links-inline">
          <a href={sefariaUrl} target="_blank" rel="noopener noreferrer">📜 ספריא</a>
          <a href={mamreUrl} target="_blank" rel="noopener noreferrer">🕯 מכון ממרא</a>
          <a href={`https://www.chabad.org/library/bible_cdo/aid/${bookIdx==='2'?15786:15785}/jewish/Chapter-${chapter||1}.htm`} target="_blank" rel="noopener noreferrer">🔯 חב״ד</a>
        </div>
      </div>
    </>
  );
}

// Keyword mapping for unit cross-linking — filters entities whose summary/heading/id contains these.
const UNIT_KEYWORDS = {
  1: ['שלמה','שְׁלֹמֹה','shlomo','גבעון','מקדש','מלכת שבא','דוד','בת שבע','חכמה','חירם','לב שומע','מלכות שלמה','solomon','temple'],
  2: ['ירבעם','רחבעם','פילוג','פילג','אחיה','שכם','עגלי','דן','בית אל','בעשא','זמרי','עמרי','split','jeroboam','rehoboam','אבים','אסא','נדב','אלה'],
  3: ['אליהו','אלישע','אחאב','איזבל','כרמל','נבות','חורב','בעל','בצורת','צרפית','אליהו התשבי','elijah','elisha','ahab','jezebel'],
  4: ['יהוא','אחאב','איזבל','יורם','יזרעאל','בית עמרי','ירבעם השני','יונה','jehu','jeroboam ii'],
  5: ['חזקיה','חזקיהו','סנחריב','ישעיהו','רבשקה','שילוח','אחז','מנשה','אשור','hezekiah','sennacherib','ahaz','manasseh'],
  6: ['יאשיה','יאשיהו','חורבן','נבוכדנצר','חולדה','צדקיהו','יהויכין','ירמיה','בבל','מצרים','פרעה','ספר תורה','josiah','destruction','babylon','zedekiah','jehoiachin']
};

function matchesUnit(entity, unitId){
  const kws = UNIT_KEYWORDS[unitId] || [];
  const hay = [entity.summary||'', entity.heading||'', entity.id||'', JSON.stringify(entity.tags||[]), JSON.stringify(entity.themes||[])].join(' ').toLowerCase();
  return kws.some(k => hay.includes(String(k).toLowerCase()));
}

function GradeLeaderboard({S}){
  const [rows, setRows] = useState(null);
  const [loading, setLoading] = useState(false);
  const hasFB = !!getFB();
  useEffect(()=>{
    let alive = true;
    if (!hasFB) { setRows([]); return; }
    setLoading(true);
    (async () => {
      try {
        const classes = await fbGet('classes');
        if (!alive) return;
        const all = [];
        if (classes && typeof classes === 'object') {
          Object.entries(classes).forEach(([code, cl]) => {
            const members = cl && cl.members ? cl.members : null;
            if (members) {
              Object.values(members).forEach(m => {
                if (m && m.name) all.push({name:m.name, avatar:m.avatar||'👤', xp:m.xp||0, classCode:code});
              });
            }
          });
        }
        all.sort((a,b)=>b.xp-a.xp);
        setRows(all.slice(0, 50));
      } catch(e) {
        setRows([]);
      } finally {
        if (alive) setLoading(false);
      }
    })();
    return ()=>{ alive = false; };
  }, [hasFB]);

  if (!hasFB) {
    return (
      <div className="card rounded-xl p-4 text-center text-amber-100/80 text-sm">
        דירוג ברמת שכבה יופעל כאשר תחובר לפיירבייס הכיתתי. כעת מוצג דירוג הכיתה בלבד.
      </div>
    );
  }
  if (loading || rows === null) {
    return (
      <div className="card rounded-xl p-4 space-y-2" aria-busy="true">
        {[0,1,2,3].map(i => (
          <div key={i} className="flex items-center gap-3">
            <div className="skel" style={{width:28,height:28,borderRadius:'50%'}}/>
            <div className="skel" style={{flex:1,height:14,borderRadius:6}}/>
          </div>
        ))}
      </div>
    );
  }
  if (rows.length === 0) {
    return (
      <div className="card rounded-xl p-4 text-center text-amber-100/80 text-sm">
        אין עדיין תלמידים אחרים בשכבה. שתפו את הקישור לחברים בכיתות אחרות.
      </div>
    );
  }
  return (
    <div className="card rounded-xl p-3 space-y-1">
      {rows.map((r, i) => {
        const isMe = r.name === S.name;
        return (
          <div key={i} className={`flex items-center gap-3 p-2 rounded-lg ${isMe?'bg-amber-500/20 border border-amber-400/50':''}`}>
            <div className="w-7 text-center font-bold text-amber-300">{i+1}</div>
            <div className="text-2xl">{r.avatar}</div>
            <div className="flex-1 min-w-0">
              <div className="font-display text-sm font-bold text-amber-100 truncate">{r.name}{isMe && <span className="me-chip">אני</span>}</div>
              <div className="text-[10px] text-amber-200/60">כיתה {r.classCode}</div>
            </div>
            <div className="text-amber-300 text-sm font-bold">⭐ <span dir="ltr" className="num">{r.xp}</span></div>
          </div>
        );
      })}
    </div>
  );
}

          </div>
        ))}
      </div>

}

function App(){

  const toggleTheme = ()=>{ if (typeof window.toggleJarvisTheme==='function') { const t=window.toggleJarvisTheme(); setTheme(t); return; } const t=theme==='dark'?'light':'dark'; setTheme(t); document.documentElement.setAttribute('data-theme',t); try{localStorage.setItem('jarvis.theme',t);}catch{} };
  useEffect(()=>{
    const onChange = (e) => { const t = (e && e.detail && e.detail.theme) || document.documentElement.getAttribute('data-theme') || 'light'; setTheme(t); };
    window.addEventListener('jarvis-theme-change', onChange);
    return ()=>window.removeEventListener('jarvis-theme-change', onChange);
  }, []);

  useEffect(() => {
    const ilDay = (t=Date.now())=>new Date(t).toLocaleDateString('en-CA',{timeZone:'Asia/Jerusalem'});
    const today = ilDay();
    let n = {...S};
    let changed = false;
    if (S.lastActive !== today) {
      const yest = ilDay(Date.now()-86400000);
      const ns = S.lastActive === yest ? S.streak + 1 : 1;
      n = {...n, lastActive:today, streak:ns};
      if (ns >= 7 && !n.achievements.includes("elijah")) n.achievements = [...n.achievements,"elijah"];
      changed = true;
    }
    const lastHR = S.lastHR ? new Date(S.lastHR) : null;
    const hrs = lastHR ? (Date.now() - lastHR.getTime())/3600000 : Infinity;
    if (hrs >= 3 && S.hearts < 5) {
      n = {...n, hearts:Math.min(5, n.hearts + Math.floor(hrs/3)), lastHR:new Date().toISOString()};
      changed = true;
    }
    if (changed) { setS(n); save(n); }
    // eslint-disable-next-line
  }, []);

  useEffect(() => save(S), [S]);

  // Expose setRoute for cross-component navigation (KingsTable, CharacterPage).

    window.__appSetRoute__ = setRoute;

    window.addEventListener('mb-navigate', onNav);
    return () => {
      window.removeEventListener('mb-navigate', onNav);
      if (window.__appSetRoute__ === setRoute) delete window.__appSetRoute__;
    };
  }, []);

  // Hash router — deep-link any page via #/path/:id. Bidirectional sync:
  // URL hash change → setRoute; setRoute → window.location.hash.
  //
  // Every user-driven route change pushes a new history entry so the
  // browser's back/forward buttons (and history.back() calls) walk the
  // user's path through the app. Only the initial-load hash write uses
  // replaceState so we don't seed an extra entry on boot.
  useEffect(() => {
    const PAGE_FROM_SLUG = {
      home: 'home', learn: 'study', study: 'study',
      timeline: 'timeline', 'kings-table': 'timeline',
      themes: 'themes', maps: 'maps',
      quiz: 'quiz', 'exam-sim': 'exam-sim', exam: 'exam',
      flashcards: 'flashcards', quotes: 'quotes', profile: 'profile', class: 'class',
      daily: 'daily', book: 'book',
      leaderboard: 'leaderboard',
      // Entity slugs — early-returned by parseHash with id, but listed here
      // so window inspection / fallback lookups never report "undefined".
      character: 'character', king: 'king', event: 'event', place: 'place',
      breadth: 'breadth', map: 'map', quote: 'quote', unit: 'unit', lesson: 'lesson'
    };
    if (typeof window !== 'undefined') window.PAGE_FROM_SLUG = PAGE_FROM_SLUG;
    const SLUG_FROM_PAGE = {
      home: 'home', study: 'study', timeline: 'timeline', themes: 'themes',
      maps: 'maps', quiz: 'quiz', exam: 'exam-sim', flashcards: 'flashcards',
      quotes: 'quotes', profile: 'profile', class: 'class',
      character: 'character', event: 'event', place: 'place', unit: 'unit', lesson: 'lesson',
      king: 'king', breadth: 'breadth', map: 'map', book: 'book',
      daily: 'daily', leaderboard: 'leaderboard'
    };
    const parseHash = () => {
      const raw = (window.location.hash || '').replace(/^#\/?/, '').trim();
      if (!raw) return null;
      const parts = raw.split('/').filter(Boolean);
      if (!parts.length) return null;
      const slug = parts[0];
      const id = parts[1] ? decodeURIComponent(parts[1]) : null;
      if (slug === 'character' && id) return {page:'character', id};
      // Kings render through CharacterPage — keep `page:'king'` so the
      // URL round-trips, and have the render branch pick CharacterPage.
      if (slug === 'king' && id)      return {page:'king', id};
      if (slug === 'event' && id)     return {page:'event', id};
      if (slug === 'place' && id)     return {page:'place', id};
      if (slug === 'breadth' && id)   return {page:'breadth', id};
      if (slug === 'map' && id)       return {page:'map', id};
      if (slug === 'unit' && id)      return {page:'unit', unitId: isNaN(+id) ? id : +id};
      if (slug === 'lesson' && id)    return {page:'lesson', unitId: isNaN(+id) ? id : +id, mode: parts[2] || 'summary'};
      // #/quiz/unit/:N  →  unit-filtered practice (20 questions from review-questions.js)
      if (slug === 'quiz' && parts[1] === 'unit' && parts[2]) {
        const u = parts[2];
        return {page:'quizUnit', unit: isNaN(+u) ? u : +u};
      }
      // /#/book/:chapter — :chapter is "1" or "2:12" (book:chapter) or free-form.
      if (slug === 'book' && id)      return {page:'book', chapter: id};
      const page = PAGE_FROM_SLUG[slug];
      if (page) return {page};
      // Unrecognised hash → render 404 page instead of silently falling back.
      return {page:'notFound', attempted: raw};
    };
    const buildHash = (r) => {
      if (!r || !r.page) return '';
      const slug = SLUG_FROM_PAGE[r.page] || r.page;
      if (r.page === 'character' && r.id) return '#/character/' + encodeURIComponent(r.id);
      if (r.page === 'king'      && r.id) return '#/king/'      + encodeURIComponent(r.id);
      if (r.page === 'event' && r.id)     return '#/event/' + encodeURIComponent(r.id);
      if (r.page === 'place' && r.id)     return '#/place/' + encodeURIComponent(r.id);
      if (r.page === 'breadth' && r.id)   return '#/breadth/' + encodeURIComponent(r.id);
      if (r.page === 'map' && r.id)       return '#/map/' + encodeURIComponent(r.id);
      if (r.page === 'unit' && r.unitId != null)   return '#/unit/' + encodeURIComponent(r.unitId);
      if (r.page === 'lesson' && r.unitId != null) return '#/lesson/' + encodeURIComponent(r.unitId) + '/' + encodeURIComponent(r.mode || 'summary');
      if (r.page === 'quizUnit' && r.unit != null) return '#/quiz/unit/' + encodeURIComponent(r.unit);
      if (r.page === 'book' && r.chapter != null)  return '#/book/' + encodeURIComponent(r.chapter);
      return '#/' + slug;
    };

    // Initial-load: if there's a hash, apply it.
    const initial = parseHash();
    if (initial) setRoute(initial);

    const onHashChange = () => {
      const next = parseHash();
      if (!next) return;
      setRoute(prev => {
        if (prev && prev.page === next.page && prev.id === next.id && prev.unitId === next.unitId && prev.unit === next.unit && prev.chapter === next.chapter) return prev;
        return next;
      });
    };
    window.addEventListener('hashchange', onHashChange);
    window.__buildHash__ = buildHash;
    return () => {
      window.removeEventListener('hashchange', onHashChange);
      if (window.__buildHash__ === buildHash) delete window.__buildHash__;
    };
  }, []);

  // Keep URL hash in sync with current route. We PUSH history entries
  // for user-driven changes so history.back() walks the user's path,
  // but REPLACE the very first entry so we don't seed an extra slot
  // on boot.
  const __routeInitRef = useRef(true);
  useEffect(() => {
    if (typeof window.__buildHash__ !== 'function') return;
    const want = window.__buildHash__(route);
    if (!want) return;
    const cur = window.location.hash || '';
    if (cur === want) { __routeInitRef.current = false; return; }
    const url = window.location.pathname + window.location.search + want;
    try {
      if (__routeInitRef.current) history.replaceState(null, '', url);
      else                        history.pushState(null, '', url);
    } catch (e) {
      window.location.hash = want;
    }
    __routeInitRef.current = false;
  }, [route]);

// Teacher mode: read-only leaderboard + CSV export
function TeacherView({S}){
  const [data, setData] = useState(null);
  const [code, setCode] = useState(S.classCode||"");
  const [loading, setLoading] = useState(false);
  const hasFB = !!getFB();
  const load = useCallback(async () => {
    if (!hasFB || !code) return;
    setLoading(true);
    const members = await fbGet(`classes/${code}/members`);
    setData(members || {});
    setLoading(false);
  }, [code, hasFB]);
  useEffect(()=>{ load(); },[load]);
  const rows = data ? Object.values(data).sort((a,b)=>(b.xp||0)-(a.xp||0)) : [];
  const exportCSV = () => {
    const header = "name,class,points,correct,total,lastActive";
    const lines = rows.map(m => {
      const name = (m.name||"").replace(/,/g,' ');
      const lastActive = m.ts ? new Date(m.ts).toISOString() : "";
      return [name, code, m.xp||0, m.details?.correct||"", m.details?.total||"", lastActive].join(",");
    });
    const csv = "\uFEFF" + [header, ...lines].join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `melakhim_class_${code}_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  return (
    <div className="space-y-4">
      <div className="card rounded-2xl p-4">
        <h1 className="font-display text-2xl font-bold text-amber-300">🧑‍🏫 מצב מורה</h1>
        <p className="text-amber-100/70 text-sm mt-1">תצוגת דירוג לקריאה בלבד. ייצוא CSV לגיליון ציונים.</p>
        <div className="mt-3 flex gap-2 flex-wrap">
          <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={8} placeholder="קוד כיתה" className="flex-1 min-w-[140px] px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-amber-100 font-mono"/>
          <button onClick={load} className="gold-btn px-4 py-2 rounded-lg">טען</button>
          <button onClick={exportCSV} disabled={!rows.length} className="gold-btn px-4 py-2 rounded-lg">📥 ייצא תוצאות CSV</button>
        </div>
      </div>
      {loading && <div className="text-amber-200 text-center py-6">טוען…</div>}
      {!loading && rows.length===0 && <div className="card rounded-xl p-4 text-center text-amber-100/60">אין נתונים לקוד זה.</div>}
      {rows.length>0 && (
        <div className="space-y-2">
          {rows.map((m,i)=>(
            <div key={i} className="card rounded-xl p-3 flex items-center gap-3">
              <div className="w-9 h-9 rounded-full bg-amber-500/20 flex items-center justify-center font-bold text-amber-200"><span dir="ltr" className="num">{i+1}</span></div>
              <div className="text-3xl">{m.avatar}</div>
              <div className="flex-1 min-w-0">
                <div className="font-bold text-amber-100 truncate">{m.name}</div>
                <div className="text-[11px] text-amber-100/60">⭐ <span dir="ltr" className="num">{m.xp||0}</span> · 🔥 <span dir="ltr" className="num">{m.streak||0}</span></div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QuizRun({params,S,setRoute,awardXP,update,publishActivity}){
  const {mode, unit, diff} = params;
  const [unitSel, setUnitSel] = useState(unit||null);
  const [diffSel, setDiffSel] = useState(diff||null);

  if (mode === "selectUnit" && !unitSel) {
    return (
      <div className="space-y-4 max-w-xl mx-auto">
        <h1 className="font-display text-2xl font-bold text-amber-300">🎯 בחר יחידה:</h1>
        <div className="grid grid-cols-2 gap-2">
          {MELAKHIM_DATA.units.map(u => (
            <button key={u.id} onClick={()=>setUnitSel(u.id)} className="card rounded-xl p-4 text-right hover:scale-105 transition">
              <div className="text-3xl">{u.icon}</div>
              <div className="font-display font-bold text-amber-100 mt-1">{u.title}</div>
              <div className="text-xs text-amber-200/60">{QUESTIONS.filter(q=>q.u===u.id).length} שאלות</div>
            </button>
          ))}
        </div>
      </div>
    );
  }
  if (mode === "selectUnit" && unitSel && !diffSel) {
    return (
      <div className="space-y-4 max-w-xl mx-auto">
        <button onClick={()=>setUnitSel(null)} className="text-amber-300 text-sm">→ חזור</button>
        <h1 className="font-display text-2xl font-bold text-amber-300">בחר רמת קושי:</h1>
        <div className="grid grid-cols-3 gap-2">
          <button onClick={()=>setDiffSel("easy")} className="diff-easy rounded-xl p-3 font-bold">קל</button>
          <button onClick={()=>setDiffSel("medium")} className="diff-medium rounded-xl p-3 font-bold">בינוני</button>
          <button onClick={()=>setDiffSel("hard")} className="diff-hard rounded-xl p-3 font-bold">קשה</button>
        </div>
        <button onClick={()=>setDiffSel("all")} className="gold-btn w-full py-3 rounded-xl">כל הרמות</button>
      </div>
    );
  }

  const finalUnit = unitSel;
  const finalDiff = diffSel || diff;
  return <QuizPlay mode={mode} unit={finalUnit} diff={finalDiff} setRoute={setRoute} S={S} awardXP={awardXP} update={update} publishActivity={publishActivity}/>;
}

function QuizPlay({mode,unit,diff,setRoute,S,awardXP,update,publishActivity,soundOn}){
  const questions = useMemo(() => {
    let pool = QUESTIONS;
    if (unit) pool = pool.filter(q => q.u === unit);
    if (diff && diff !== "all") pool = pool.filter(q => q.d === diff);
    const count = mode === "battle" ? 20 : 10;
    const fy = (arr)=>{ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
    return fy(pool).slice(0, count).map(q=>{
      const ix = fy([0,1,2,3]);
      return {...q, a: ix.map(i=>q.a[i]), c: ix.indexOf(q.c), _origC: q.c};
    });
  }, [mode,unit,diff]);

  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [correct, setCorrect] = useState(0);
  const [missed, setMissed] = useState([]);
  const [expanded, setExpanded] = useState(false);
  const [time, setTime] = useState(mode==="battle"?180:0);
  const [waitingNext, setWaitingNext] = useState(false);
  const [hintUsed, setHintUsed] = useState(0);
  const [hiddenOptions, setHiddenOptions] = useState([]);
  const timed = mode === "battle";
  const audioRef = useRef(null);
  const getAudio = () => {
    if (audioRef.current) return audioRef.current;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioRef.current = new AC();
      return audioRef.current;
    }catch{return null}
  };
  const playChord = (freqs, dur=0.15) => {
    if (!soundOn) return;
    const ac = getAudio(); if (!ac) return;
    const now = ac.currentTime;
    freqs.forEach(f => {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(.0001, now);
      g.gain.exponentialRampToValueAtTime(.18, now+.01);
      g.gain.exponentialRampToValueAtTime(.0001, now+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now+dur+.02);
    });
  };
  const playCorrect = () => playChord([523.25, 659.25, 783.99], .15); // C major triad
  const playWrong = () => {
    if (!soundOn) return;
    const ac = getAudio(); if (!ac) return;
    const now = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(180, now); o.frequency.exponentialRampToValueAtTime(90, now+.2);
    g.gain.setValueAtTime(.0001, now); g.gain.exponentialRampToValueAtTime(.2, now+.01); g.gain.exponentialRampToValueAtTime(.0001, now+.2);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now+.22);
  };
  const vibrate = pat => { try{ if (navigator.vibrate && window.matchMedia('(pointer:coarse)').matches) navigator.vibrate(pat); }catch{} };
  const useHint = () => {
    if (hintUsed || picked !== null) return;
    const q = questions[idx];
    const wrongIdx = q.a.map((_,i)=>i).filter(i=>i!==q.c);
    const fy = (arr)=>{ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
    setHiddenOptions(fy(wrongIdx).slice(0,2));
    setHintUsed(1);
  };

  useEffect(() => {
    if (!timed || waitingNext) return;
    if (time <= 0) { finish(correct); return; }
    const t = setTimeout(()=>setTime(x=>x-1), 1000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [time,waitingNext]);

  const q = questions[idx];
  if (!q) return (
    <div className="max-w-md mx-auto text-center py-8">
      <div className="text-5xl mb-3">🔍</div>
      <p className="text-amber-200">אין שאלות בסינון הזה. נסה סינון אחר.</p>
      <button onClick={()=>setRoute({page:"quiz"})} className="mt-4 gold-btn px-4 py-2 rounded-lg">חזרה</button>
    </div>
  );

  const pick = i => {
    if (picked !== null) return;
    setPicked(i);
    const right = i === q.c;
    if (right) {
      playCorrect(); vibrate([50]);
      setCorrect(x => x+1);
      setExpanded(false);
      if (q.d === "hard") update(p => {
        const nhc = (p.hardCorrect||0) + 1;
        let ach = p.achievements;
        if (nhc >= 10 && !ach.includes("hard")) ach = [...ach, "hard"];
        return {...p, hardCorrect:nhc, achievements:ach};
      });
    } else {
      playWrong(); vibrate([100,50,100]);
      update(p => ({...p, hearts:Math.max(0, p.hearts-1)}));
      setMissed(m => [...m, {...q, picked:i}]);
      setExpanded(true);
    }
    setWaitingNext(true);
  };

  const nextQ = () => {
    if (idx+1 >= questions.length) finish(correct);
    else { setIdx(idx+1); setPicked(null); setWaitingNext(false); setExpanded(false); setHiddenOptions([]); }
  };

  const finish = async (finalCorrect) => {
    const pct = Math.round((finalCorrect / questions.length) * 100);
    const earned = finalCorrect * 10 + (pct===100?50:0) + (diff==="hard"?finalCorrect*5:0);
    awardXP(earned);
    update(p => {
      const scores = {...p.quizScores};
      if (unit) scores[unit] = Math.max(scores[unit]||0, pct);
      let ach = [...p.achievements];
      if (!ach.includes("first")) ach.push("first");
      if (pct===100 && !ach.includes("perfect")) ach.push("perfect");
      const allHave = MELAKHIM_DATA.units.every(u => scores[u.id] > 0);
      if (allHave && !ach.includes("all6")) ach.push("all6");
      const pq = (p.perfectQuizzes||0) + (pct===100?1:0);
      if (pq >= 5 && !ach.includes("prophet")) ach.push("prophet");
      return {...p, quizScores:scores, achievements:ach, totalQuizzes:(p.totalQuizzes||0)+1, perfectQuizzes:pq};
    });
    publishActivity && publishActivity("quiz", {score:pct, total:questions.length, mode, unit, diff});
    setRoute({page:"quizResult", pct, correct:finalCorrect, total:questions.length, earned, mode, unit, diff, missed});
  };

  const progress = (idx / questions.length) * 100;

  return (
    <div className="max-w-2xl mx-auto space-y-4">
      <div className="sticky top-[108px] z-20 card rounded-xl p-3">
        <div className="flex items-center justify-between mb-2 text-sm">
          <span className="font-bold text-amber-200">{idx+1}/{questions.length}</span>
          {timed && <span className={`font-mono font-bold ${time<30?"text-red-400":"text-amber-200"}`}>⏱ {time}</span>}
          <div className="flex items-center gap-2">
            <span className="text-emerald-400">✓ {correct}</span>
            <span className="text-xs">{Array(S.hearts).fill("❤️").join("")}{Array(5-S.hearts).fill("🖤").join("")}</span>
          </div>
        </div>
        <div className="h-2 rounded-full bg-slate-800 overflow-hidden">
          <div className="h-full bg-gradient-to-l from-amber-300 to-amber-600 transition-all" style={{width:progress+"%"}}/>
        </div>
      </div>

      <div key={idx} className="fade-up parchment rounded-2xl p-5 md:p-7">
        <div className="flex items-center gap-2 mb-3 text-xs flex-wrap">
          <DiffBadge d={q.d}/>
          <TypeBadge t={q.t}/>
          <span className="px-2 py-0.5 rounded-full bg-amber-900 text-amber-100 font-bold">יחידה {MELAKHIM_DATA.units.find(u=>u.id===q.u)?.num}</span>
          <span className="text-amber-700">{q.s}</span>
        </div>
        <h2 className="font-display text-lg md:text-xl font-bold text-amber-950 leading-snug">{q.q}</h2>
      </div>

      {picked===null && !hintUsed && (
        <div className="flex justify-end">
          <button onClick={useHint} className="hint-btn" aria-label="הסר שתי תשובות שגויות">🤝 רמז מחבר (50/50)</button>
        </div>
      )}

      <div className="space-y-2">
        {q.a.map((a,i) => {
          const hidden = hiddenOptions.includes(i);
          let cls = "w-full text-right px-4 py-3.5 rounded-xl font-semibold text-base transition border-2 ";
          if (hidden) cls += "border-slate-800 opacity-20 text-amber-100/30 pointer-events-none line-through";
          else if (picked===null) cls += "card border-slate-700 hover:border-amber-400 hover:bg-amber-500/10 text-amber-100";
          else if (i===q.c) cls += "correct-ans border-emerald-400 text-white";
          else if (i===picked) cls += "wrong-ans border-red-500 text-white shake";
          else cls += "border-slate-800 opacity-40 text-amber-100/60";
          return (
            <button key={i} disabled={picked!==null || hidden} onClick={()=>pick(i)} className={cls} aria-label={`תשובה ${["א׳","ב׳","ג׳","ד׳"][i]}`} aria-hidden={hidden?"true":undefined}>
              <span className="al ml-2" aria-hidden="true">{["א","ב","ג","ד"][i]}</span>
              {a}
            </button>
          );
        })}
      </div>

      {picked !== null && (
        <>
          {picked!==q.c && (
            <button onClick={()=>setExpanded(e=>!e)} className="text-xs text-amber-300 underline" aria-expanded={expanded}>
              {expanded?"הסתר הסבר":"הצג הסבר"}
            </button>
          )}
          {(expanded || picked===q.c) && <ExpandSources q={q} picked={picked}/>}
          <div className="next-btn">
            <button onClick={nextQ} className="gold-btn w-full py-3 rounded-xl text-base" aria-label={idx+1 >= questions.length ? "סיים את החידון" : "שאלה הבאה"}>
              {idx+1 >= questions.length ? "🏁 סיום ותוצאה" : "שאלה הבאה ←"}

          </div>
        </>
      )}
    </div>
  );
}

function QuotePractice({quotes,onBack,awardXP,update}){
  const shuffled = useMemo(()=>[...quotes].sort(()=>Math.random()-0.5), [quotes]);
  const [idx, setIdx] = useState(0);
  const [reveal, setReveal] = useState(false);
  const [score, setScore] = useState(0);
  const [knew, setKnew] = useState(null);
  const cur = shuffled[idx];
  if (!cur) return <div className="text-amber-200 text-center py-8">אין ציטוטים</div>;

  const next = didKnow => {
    if (didKnow) { setScore(s=>s+1); awardXP(5); update(p => {
      const qc = (p.quoteCorrect||0) + 1;
      let ach = p.achievements;
      if (qc >= 30 && !ach.includes("quoter")) ach = [...ach, "quoter"];
      return {...p, quoteCorrect:qc, achievements:ach};
    }); }
    setKnew(didKnow);
    setTimeout(() => {
      if (idx+1 >= shuffled.length) {
        alert(`סיימת! ידעת ${score+(didKnow?1:0)} מתוך ${shuffled.length}. +${(score+(didKnow?1:0))*5} XP`);
        onBack();
      } else { setIdx(idx+1); setReveal(false); setKnew(null); }
    }, 400);
  };
  return (
    <div className="max-w-2xl mx-auto space-y-4">
      <button onClick={onBack} className="text-amber-300 text-sm">→ יציאה</button>
      <div className="card rounded-xl p-3">
        <div className="flex items-center justify-between text-sm mb-2">
          <span className="text-amber-200">ציטוט {idx+1} / {shuffled.length}</span>
          <span className="text-emerald-400">✓ {score}</span>
        </div>
        <div className="h-1.5 rounded-full bg-slate-800 overflow-hidden"><div className="h-full bg-amber-400 transition-all" style={{width:(idx/shuffled.length*100)+"%"}}/></div>
      </div>
      <div className={`parchment rounded-2xl p-6 md:p-8 min-h-[240px] flex flex-col justify-center ${knew===true?"correct-ans":""} ${knew===false?"wrong-ans":""}`}>
        <div className="text-xs text-amber-800 mb-3 text-center">יחידה {cur.unit}</div>
        <p className="hebrew text-amber-900 text-xl md:text-2xl font-bold text-center">"{cur.text}"</p>
        {reveal && (
          <div className="mt-5 pt-4 border-t border-amber-700/30 text-sm fade-up">
            <div className="text-amber-950"><strong>🎯 מי:</strong> {cur.who}</div>
            <div className="text-amber-800 mt-1"><strong>📖 הקשר:</strong> {cur.context}</div>
            <div className="text-amber-800 mt-1"><strong>📚</strong> יחידה {cur.unit} - {cur.unitTitle}</div>
          </div>
        )}
      </div>
      {!reveal && <button onClick={()=>setReveal(true)} className="gold-btn w-full py-3 rounded-xl">🔍 חשוף תשובה</button>}
      {reveal && knew===null && (
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>next(false)} className="py-3 rounded-xl bg-red-600/30 text-red-100 font-bold border border-red-500/50">❌ לא ידעתי</button>
          <button onClick={()=>next(true)} className="py-3 rounded-xl bg-emerald-600/30 text-emerald-100 font-bold border border-emerald-500/50">✅ ידעתי</button>
        </div>
      )}
    </div>
  );
}

function BookChapterPage({chapter, setRoute}){
  const ch = String(chapter || '').trim();

    const refs = [].concat(e.book_refs || [], e.chapter_ref || []);

        <section className="card rounded-xl p-4">
          <h2 className="font-display text-base font-bold text-on-parchment mb-2">ציטוטים בפרק</h2>

function MapPractice({map, onBack, awardXP, update}){
  const rounds = useMemo(() => {
    return [...map.locs].sort(()=>Math.random()-0.5).map((l) => {
      const others = map.locs.filter(x => x.n !== l.n).sort(()=>Math.random()-0.5).slice(0, 3);
      const opts = [...others, l].sort(()=>Math.random()-0.5);
      return {loc:l, opts, correctIdx:opts.findIndex(o => o.n===l.n)};
    });
  }, [map]);
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const cur = rounds[idx];

  const pick = i => {
    if (picked !== null) return;
    setPicked(i);
    if (i === cur.correctIdx) { setScore(s=>s+1); awardXP(10); update(p => ({...p, mapCorrect:(p.mapCorrect||0)+1})); }
    setTimeout(() => {
      if (idx+1 >= rounds.length) {
        alert(`סיימת! ${score + (i===cur.correctIdx?1:0)} מתוך ${rounds.length}`);
        onBack();
      } else { setIdx(idx+1); setPicked(null); }
    }, 1500);
  };

  return (
    <div className="max-w-2xl mx-auto space-y-4">
      <button onClick={onBack} className="text-amber-300 text-sm">→ יציאה</button>
      <div className="card rounded-xl p-3">
        <div className="flex items-center justify-between text-sm mb-1">
          <span className="font-bold text-amber-200">{idx+1}/{rounds.length} · {map.name}</span>
          <span className="text-emerald-400">✓ {score}</span>
        </div>
        <div className="h-1.5 rounded-full bg-slate-800 overflow-hidden"><div className="h-full bg-amber-400 transition-all" style={{width:(idx/rounds.length*100)+"%"}}/></div>
      </div>
      <div className="parchment rounded-2xl p-6">
        <div className="text-center">
          <div className="text-5xl mb-2">📍</div>
          <h2 className="font-display text-2xl font-black text-amber-900">{cur.loc.n}</h2>
          <p className="text-amber-800 text-sm mt-3">מה החשיבות של המקום הזה?</p>
        </div>
      </div>
      <div className="space-y-2">
        {cur.opts.map((o,i) => {
          let cls = "w-full text-right p-3 rounded-xl border-2 text-sm transition ";
          if (picked===null) cls += "card border-slate-700 hover:border-amber-400 text-amber-100";
          else if (i===cur.correctIdx) cls += "correct-ans border-emerald-400 text-white";
          else if (i===picked) cls += "wrong-ans border-red-500 text-white";
          else cls += "border-slate-800 opacity-40 text-amber-100/60";
          return <button key={i} disabled={picked!==null} onClick={()=>pick(i)} className={cls}>{o.d}</button>;
        })}
      </div>
    </div>
  );
}

// ============ EXAM SIM ============
function ExamSim({S,update,awardXP,setRoute,publishActivity}){
  const [phase, setPhase] = useState("intro");
  const [answers, setAnswers] = useState({});
  const [timeLeft, setTimeLeft] = useState(0);
  const [examQs, setExamQs] = useState([]);

  const buildExam = () => {
    // תשפ"ו structure: Part A — 5 בקיאות (9 נק׳ כ״א = 45), Part B+C — 7 ידע/רוחב (8 נק׳ כ״א = 56), סה״כ 101.
    const bekiut = QUESTIONS.filter(q => q.d === "easy").sort(()=>Math.random()-0.5).slice(0, 5);
    const yeda   = QUESTIONS.filter(q => q.d === "medium").sort(()=>Math.random()-0.5).slice(0, 4);
    const rachav = QUESTIONS.filter(q => q.d === "hard").sort(()=>Math.random()-0.5).slice(0, 3);
    return [...bekiut, ...yeda, ...rachav].map((q,i) => ({...q, n:i+1, points: i<5 ? 9 : 8}));
  };

  useEffect(() => {
    if (phase !== "running") return;
    if (timeLeft <= 0) { finish(); return; }
    const t = setTimeout(()=>setTimeLeft(x=>x-1), 1000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [timeLeft,phase]);

  const start = () => {
    setExamQs(buildExam());
    setPhase("running");
    // תשפ״ו: 2:15 (2h 15m) standard. Accommodation +15% (2:35) handled in new ExamSim2551.
    setTimeLeft(2*60*60 + 15*60);
    setAnswers({});
  };

  const finish = () => {
    setPhase("done");
    const correctQs = examQs.filter(q => answers[q.n] === q.c);
    const points = correctQs.reduce((s,q)=>s+q.points, 0);
    awardXP(points);
    if (points >= 80 && !S.achievements.includes("bagrut")) {
      update(p => ({...p, achievements:[...p.achievements, "bagrut"]}));
    }
    publishActivity && publishActivity("exam", {score:points});
  };

  if (phase === "intro") {
    const d = daysTo(EXAM_DATE);
    return (
      <div className="max-w-2xl mx-auto space-y-4">
        <h1 className="font-display text-2xl md:text-3xl font-bold text-amber-300">📝 סימולציית בגרות {EXAM_INFO.code}</h1>
        <div className="parchment rounded-2xl p-5 md:p-7">
          <h2 className="font-display text-xl font-bold text-amber-900 mb-3">{EXAM_INFO.name}</h2>
          <div className="space-y-2 text-sm text-amber-950">
            <div><strong>📅 תאריך:</strong> {EXAM_INFO.date} · בעוד {d} ימים</div>
            <div><strong>🎓 כיתה:</strong> {EXAM_INFO.grade}</div>
            <div><strong>⏱ זמן:</strong> {EXAM_INFO.duration}</div>
            <div><strong>📖 חומר עזר:</strong> {EXAM_INFO.allowed}</div>
            <div><strong>📊 ניקוד:</strong> 101 נקודות (45 בפרק א + 56 בפרקים ב+ג)</div>
            <div className="text-xs text-amber-700 pt-2 border-t border-amber-700/30">{EXAM_INFO.source}</div>
          </div>
          <div className="divider my-4"/>
          <h3 className="font-bold text-amber-900 mb-2">מבנה הבחינה:</h3>
          <div className="space-y-2">
            {EXAM_INFO.structure.map((s,i) => (
              <div key={i} className="bg-white/40 rounded-lg p-3" style={{borderRight:`4px solid ${s.color}`}}>
                <div className="font-bold text-amber-950">{s.title}</div>
                <div className="text-xs text-amber-800">{s.detail}</div>
                <div className="text-[10px] text-amber-700 mt-1">{s.desc}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card rounded-xl p-4 text-sm text-amber-100/80">💡 הסימולציה כוללת 12 שאלות מייצגות (5 בקיאות + 7 ידע/רוחב) — 101 נק׳ סה״כ. השג 80+ להישג "מוכן לבגרות".</div>
        <button onClick={start} className="gold-btn w-full py-4 rounded-2xl text-lg font-bold glow">🚀 התחל סימולציה</button>
      </div>
    );
  }

  if (phase === "done") {
    const correctQs = examQs.filter(q => answers[q.n] === q.c);
    const points = correctQs.reduce((s,q)=>s+q.points, 0);
    const letter = points>=90?"👑":points>=80?"🏆":points>=70?"🎯":points>=55?"📚":"💪";
    return (
      <div className="max-w-2xl mx-auto space-y-4">
        <div className="text-center py-6">
          <div className="text-7xl mb-3">{letter}</div>
          <h1 className="font-display text-3xl md:text-4xl font-black text-amber-300">ציון: {points}</h1>
          <p className="text-amber-100/70 mt-2">{correctQs.length} / {examQs.length} נכונות · 101 נק׳ בסך</p>
        </div>
        <div className="space-y-2">
          <h3 className="font-bold text-amber-200">סקירה:</h3>
          {examQs.map((q,i) => {
            const user = answers[q.n];
            const right = user === q.c;
            return (
              <div key={i} className={`card rounded-lg p-3 border-r-4 ${right?"border-r-emerald-500":"border-r-red-600"}`}>
                <div className="flex items-center gap-2 text-xs text-amber-200/60 mb-1">
                  <span>{right?"✅":"❌"}</span>
                  <span>{q.points} נק׳</span>
                  <span>· {q.s}</span>
                </div>
                <p className="text-amber-100 text-sm font-bold">{q.q}</p>
                <p className="text-xs text-amber-100/70 mt-1">
                  {right ? <span className="text-emerald-400">✓ נכון: {q.a[q.c]}</span>
                    : <><span className="text-red-400">שלך: {user!==undefined?q.a[user]:"(ריק)"}</span> · <span className="text-emerald-400">נכון: {q.a[q.c]}</span></>}
                </p>
              </div>
            );
          })}
        </div>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>setPhase("intro")} className="gold-btn py-3 rounded-xl">🔄 שוב</button>
          <button onClick={()=>setRoute({page:"home"})} className="card py-3 rounded-xl text-amber-200">🏠 דשבורד</button>
        </div>
      </div>
    );
  }

  const mins = Math.floor(timeLeft/60), secs = timeLeft%60;
  const answered = Object.keys(answers).length;
  return (
    <div className="max-w-3xl mx-auto space-y-4">
      <div className="sticky top-[108px] z-20 card rounded-xl p-3 flex items-center justify-between">
        <div className="text-sm"><span className="text-amber-200 font-bold">{answered}/{examQs.length}</span></div>
        <div className={`font-mono font-bold text-lg ${timeLeft<300?"text-red-400":"text-amber-200"}`}>⏱ {String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}</div>
        <button onClick={finish} className="px-3 py-1.5 rounded-lg bg-red-700 text-white text-xs font-bold">הגשה</button>
      </div>
      {examQs.map((q,i) => (
        <div key={i} className="card rounded-xl p-4">
          <div className="flex items-center gap-2 text-xs mb-2 flex-wrap">
            <span className="px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-300 font-bold">שאלה {q.n}</span>
            <span className="text-amber-200/60">{q.points} נק׳</span>
            <DiffBadge d={q.d}/>
            <span className="text-amber-200/40 mr-auto">{q.s}</span>
          </div>
          <p className="text-amber-100 font-bold mb-3">{q.q}</p>
          <div className="space-y-1.5">
            {q.a.map((a,j) => (
              <button key={j} onClick={()=>setAnswers({...answers,[q.n]:j})}
                className={`w-full text-right px-3 py-2 rounded-lg border text-sm transition ${answers[q.n]===j?"border-amber-400 bg-amber-500/20 text-amber-100":"border-slate-700 hover:border-amber-400/50 text-amber-100/80"}`}>
                <span className="inline-block w-6 h-6 rounded-full bg-amber-500/20 text-amber-300 text-xs text-center leading-6 ml-2 font-bold">{["א","ב","ג","ד"][j]}</span>
                {a}
              </button>
            ))}
          </div>
        </div>
      ))}
      <button onClick={finish} className="gold-btn w-full py-3 rounded-xl text-base">📤 הגש בחינה</button>
    </div>
  );
}

// ============ CLASS BOARD ============
function ClassBoard({S,update,setRoute}){
  const [classData, setClassData] = useState(null);
  const [activity, setActivity] = useState([]);
  const [loading, setLoading] = useState(true);
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [toast, setToast] = useState("");
  const [period, setPeriod] = useState("week"); // week|month|all
  const [lastSync, setLastSync] = useState(null);
  const [nowTick, setNowTick] = useState(0);
  const prevRankRef = useRef(null);
  const hasFB = !!getFB();
  useEffect(()=>{ if(!toast) return; const id=setTimeout(()=>setToast(""), 3500); return ()=>clearTimeout(id); },[toast]);
  useEffect(()=>{ const id=setInterval(()=>setNowTick(t=>t+1),30000); return ()=>clearInterval(id); },[]);

  const loadClass = useCallback(async () => {
    setLoading(true);
    if (hasFB && S.classCode) {
      const members = await fbGet(`classes/${S.classCode}/members`);
      const act = await fbGet(`classes/${S.classCode}/activity`);
      setClassData(members || {});
      setActivity(act ? Object.values(act).sort((a,b)=>b.ts-a.ts).slice(0,150) : []);
      setLastSync(Date.now());
    }
    setLoading(false);
  }, [S.classCode, hasFB]);

  useEffect(() => { loadClass(); const iv = setInterval(loadClass, 15000); return ()=>clearInterval(iv); }, [loadClass]);

  const syncLabel = useMemo(() => {
    if (!lastSync) return "מסנכרן...";
    const mins = Math.floor((Date.now()-lastSync)/60000);
    if (mins<1) return "עודכן זה עתה";
    if (mins===1) return "עודכן לפני דקה";
    return `עודכן לפני ${mins} דק׳`;
  // eslint-disable-next-line
  }, [lastSync, nowTick]);

  const addFriend = () => {
    const o = decodeShare(code);
    if (!o) { setErr("קוד לא חוקי"); return; }
    update(p => {
      const friends = {...p.friends};
      const existing = friends[o.n];
      if (!existing || o.s > existing.bestScore) {
        friends[o.n] = {avatar:o.a, bestScore:o.s, total:o.t, date:o.d};
      }
      return {...p, friends};
    });
    setCode(""); setErr("");
  };

  const periodCutoff = period==="week" ? Date.now() - 7*86400000 : period==="month" ? Date.now() - 30*86400000 : 0;
  const liveMembers = classData ? Object.values(classData)
    .filter(m => period==="all" || !m.ts || m.ts >= periodCutoff)
    .sort((a,b)=>(b.xp||0)-(a.xp||0)) : [];
  useEffect(()=>{
    if(!liveMembers.length || !S.name) return;
    const myIdx = liveMembers.findIndex(m=>m.name===S.name);
    if(myIdx<0) return;
    const myRank = myIdx+1;
    const prev = prevRankRef.current;
    if(prev!=null && myRank < prev){
      const overtaken = liveMembers[myIdx+1];
      if(overtaken) setToast(`🎉 עקפת את ${overtaken.name}!`);
    }
    prevRankRef.current = myRank;
  // eslint-disable-next-line
  },[liveMembers.map(m=>m.name+':'+m.xp).join('|'), S.name]);
  const podium = liveMembers.slice(0,3);
  const rest = liveMembers.slice(3);
  const localFriends = Object.entries(S.friends||{}).map(([name,f])=>({...f, name})).sort((a,b)=>b.bestScore-a.bestScore);
  const myBest = Math.max(0, ...Object.values(S.quizScores||{}));

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h1 className="font-display text-2xl md:text-3xl font-bold text-amber-300">🏆 הכיתה שלי</h1>
        {S.classCode && <span className="text-xs px-3 py-1 rounded-full bg-amber-500/20 text-amber-200 font-bold">קוד: {S.classCode}</span>}
      </div>

      {!hasFB && (
        <div className="card rounded-xl p-4 border-amber-500/50">
          <div className="flex items-start gap-3">
            <div className="text-3xl">🔌</div>
            <div className="flex-1">
              <h3 className="font-bold text-amber-300">לוח כיתתי חי - נדרשת הגדרה חד פעמית</h3>
              <p className="text-xs text-amber-100/70 mt-1">כדי שכל הכיתה תראה פעילות בזמן אמת. לחץ על "איך להגדיר" להוראות.</p>
              <button onClick={()=>alert('הוראות להגדרת לוח כיתתי חי (Firebase):\\n\\n1. לך ל-firebase.google.com והתחבר\\n2. צור פרויקט חדש (שם: melakhim-class)\\n3. תפריט Build > Realtime Database > Create Database\\n4. בחר location קרוב (europe-west1)\\n5. התחל במצב test mode\\n6. Rules: שנה ל:\\n{\\n  "rules": {\\n    ".read": true,\\n    ".write": true\\n  }\\n}\\n7. העתק את הכתובת מלמעלה\\n   (למשל: https://melakhim-class-default-rtdb.europe-west1.firebasedatabase.app)\\n8. בפרופיל שלי כאן, פתח "הגדרות מתקדמות" והדבק\\n9. שתף את אותה כתובת + קוד הכיתה לכל החברים\\n\\nכולם עם אותו קוד כיתה = אותו לוח!')} className="text-amber-400 text-xs underline">איך להגדיר? ←</button>
            </div>
          </div>
        </div>
      )}

      {hasFB && S.classCode && (

          <section>
            <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
              <h2 className="font-display text-lg font-bold text-amber-200">📊 דירוג הכיתה · חי</h2>

              <button role="tab" aria-selected={period==="week"} onClick={()=>setPeriod("week")} className={`period-chip ${period==="week"?"active":""}`}>השבוע</button>
              <button role="tab" aria-selected={period==="month"} onClick={()=>setPeriod("month")} className={`period-chip ${period==="month"?"active":""}`}>החודש</button>
              <button role="tab" aria-selected={period==="all"} onClick={()=>setPeriod("all")} className={`period-chip ${period==="all"?"active":""}`}>הכל</button>
            </div>
            {loading ? (
              <div className="space-y-2" aria-busy="true" aria-label="טוען דירוג">
                {[0,1,2,3,4].map(i=>(

                    {(() => {
                      const order = [podium[1], podium[0], podium[2]].map((m,k)=>({m, place: k===0?2:k===1?1:3}));
                      return order.map((o,idx)=>{

                        const crown = o.place===1?'👑':o.place===2?'🥈':'🥉';
