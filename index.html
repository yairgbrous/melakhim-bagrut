          <button onClick={addFriend} className="gold-btn px-4 rounded-lg text-sm">הוסף</button>
        </div>
        {err && <div className="text-red-400 text-xs mt-1">{err}</div>}
      </div>

      {localFriends.length > 0 && (
        <section>
          <h3 className="font-display text-lg font-bold text-amber-200 mb-2">👥 חברים (מקודי שיתוף)</h3>
          <div className="space-y-2">
            <div className="flex items-center gap-3 p-3 rounded-xl parchment ring-2 ring-amber-500">
              <div className="text-3xl">{S.avatar}</div>
              <div className="flex-1"><div className="font-bold text-amber-950">{S.name}<span className="me-chip">אתה</span></div></div>
              <div className="font-display text-2xl font-black text-amber-900">{myBest}%</div>
            </div>
            {localFriends.map((f,i) => (
              <div key={i} className="flex items-center gap-3 p-3 rounded-xl card">
                <div className="text-3xl">{f.avatar}</div>
                <div className="flex-1 min-w-0"><div className="font-bold text-amber-100 truncate">{f.name}</div></div>
                <div className="font-display text-2xl font-black text-amber-200">{f.bestScore}%</div>
              </div>
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

        <div className="text-7xl mb-2">{S.avatar}</div>
        <h1 className="font-display text-2xl font-black text-amber-900">{S.name}</h1>
        <div className="text-amber-800 mt-1">{level.icon} {level.title}</div>
        {S.classCode && <div className="text-xs text-amber-700 mt-1">קוד כיתה: {S.classCode}</div>}
        <button onClick={()=>setEditing(!editing)} className="mt-3 text-xs text-amber-700 underline">{editing?"ביטול":"ערוך פרופיל"}</button>
      </div>
      {editing && (
        <div className="card rounded-xl p-4 space-y-3">
          <div><label className="text-xs text-amber-200 font-bold block mb-1">שם</label><input value={name} onChange={e=>setName(e.target.value)} maxLength={20} className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-amber-100"/></div>
          <div><label className="text-xs text-amber-200 font-bold block mb-1">קוד כיתה</label><input value={classCode} onChange={e=>setClassCode(e.target.value.toUpperCase())} maxLength={8} className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-amber-100 font-mono"/></div>
          <div>
            <label className="text-xs text-amber-200 font-bold block mb-1">אוואטר</label>
            <div className="grid grid-cols-10 gap-0.5 max-h-40 overflow-y-auto fancy-scroll bg-slate-900/60 p-2 rounded-lg">
              {AVATARS.map(a => <button key={a} onClick={()=>setAvatar(a)} className={`text-2xl p-1 rounded avatar-btn ${avatar===a?"selected":""}`}>{a}</button>)}
            </div>
          </div>
          <button onClick={()=>{update({name:name.trim()||S.name, avatar, classCode:classCode.trim()});setEditing(false);}} className="gold-btn w-full py-2 rounded-lg">שמור</button>
        </div>
      )}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        <Stat i="⭐" v={S.xp} l="XP" c="gold"/>
        <Stat i="🔥" v={S.streak} l="רצף" c="crimson"/>
        <Stat i="⚔️" v={S.totalQuizzes||0} l="חידונים" c="purple"/>
        <Stat i="💯" v={S.perfectQuizzes||0} l="מושלמים" c="emerald"/>
      </div>
      <details className="card rounded-xl p-3">
        <summary className="text-amber-300 text-sm font-bold cursor-pointer">🔧 הגדרות מתקדמות (Firebase לחבר׳ה)</summary>
        <div className="mt-3 space-y-2">
          <label className="text-xs text-amber-200 font-bold block">Firebase URL (ללוח כיתתי חי):</label>
          <input value={fbUrl} onChange={e=>setFbUrl(e.target.value)} placeholder="https://YOUR-PROJECT-default-rtdb.firebaseio.com" className="w-full px-2 py-1 rounded bg-slate-800 border border-slate-700 text-amber-100 text-xs font-mono"/>
          <button onClick={saveFbUrl} className="gold-btn w-full py-1.5 rounded text-xs">שמור ורענן</button>
          <p className="text-[10px] text-amber-100/50 mt-2">הגדרה פעם אחת. לכל הלומדים עם אותו קוד כיתה = אותו לוח.</p>
        </div>
      </details>
      <button onClick={()=>{if(confirm("לאפס הכל? אי אפשר לבטל!")){localStorage.removeItem(KEY);location.reload();}}} className="text-xs text-red-400 hover:text-red-300">🗑 אפס את כל ההתקדמות</button>
    </div>
  );
}

// ============ RENDER ============
// ErrorBoundary is loaded from components/ErrorBoundary.js (window.ErrorBoundaryComponent).
// Minimal inline fallback kept only for the (unlikely) case that the external
// file fails to load before the render call below.
const EB = (typeof window !== 'undefined' && window.ErrorBoundaryComponent)
  ? window.ErrorBoundaryComponent
  : (function(){
      class _EBFallback extends React.Component {
        constructor(p){ super(p); this.state={err:null}; }
        static getDerivedStateFromError(err){ return {err}; }
        componentDidCatch(err,info){ try{console.error('EB',err,info);}catch{} }
        render(){
          if(!this.state.err) return this.props.children;
          return React.createElement('div', {style:{maxWidth:540,margin:'48px auto',padding:24,textAlign:'center'}},
            React.createElement('div', null, 'משהו השתבש'),
            React.createElement('button', {onClick:()=>location.reload()}, 'רענן')
          );
        }
      }
      return _EBFallback;
    })();
// init theme from localStorage['jarvis.theme']; first visit honors prefers-color-scheme; default light
(function(){
  try{
    const saved = localStorage.getItem('jarvis.theme');
    let t = saved;
    if (!t) {
      const prefDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      t = prefDark ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', t);
  }catch{ document.documentElement.setAttribute('data-theme','light'); }
})();
ReactDOM.createRoot(document.getElementById("root")).render(
  <EB>
    <App/>
    {typeof window !== "undefined" && window.ToastHostComponent
      ? React.createElement(window.ToastHostComponent)
      : null}
  </EB>
);
</script>
<script>
  // PWA service worker: register, and auto-activate a new SW as soon as
  // it's installed so users don't need to hard-reload between deploys.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js?v=14100').then(function(reg){
        if (!reg) return;
        reg.addEventListener('updatefound', function(){
          var sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', function(){
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              // A newer SW is waiting; tell it to take over now.
              try { sw.postMessage('SKIP_WAITING'); } catch (e) {}
            }
          });
        });
      }).catch(function(){});
      // When the controlling SW changes (post-skipWaiting), reload once so
      // the new precache is actually used.
      var reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    });
  }
</script>
</body>
</html>
